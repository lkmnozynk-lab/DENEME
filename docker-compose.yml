services:
  db:
    image: postgres:16-alpine
    container_name: neraajans-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: neraajans
      POSTGRES_PASSWORD: neraajans_dev_pw
      POSTGRES_DB: neraajans
    ports:
      - "5432:5432"
    volumes:
      - neraajans_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neraajans -d neraajans"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  neraajans_pgdata:
